<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link href="css/style.css" rel="stylesheet">
       
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
    </head>
    <body>
       
        <div class="container">
            <div class="row">
               
                <div  class="col-lg-4 col-md-5 offset-lg-4 offset-md-4 mt-3">
                    <div class="border-2 card">
                        <div class="card-body justify-content-center calculationarea">
                            <div class="answer-section">
                                <div class="calcsection">
                                   
                                </div>
                                <div class="answerarea">
                                    second
                                </div>
                            </div>
                            <div class="grid-container">
                                <div class="grid-item calcitem" id="expo">e</div>
                                <div class="grid-item calcitem" id="pie">π</div>
                                <div class="grid-item calcitem" id="sin">sin</div>  
                                <div class="grid-item calcitem" id="deg">deg</div>
                                <div class="grid-item-two calcitem redc" id="clear">C</div>
                                <div class="grid-item-two calcitem" id="openbrac">(</div>  
                                <div class="grid-item-two calcitem" id="closedbrac">)</div>
                                <div class="grid-item-two calcitem yellowback" id="slash">/</div>
                                <div class="grid-item-two calcitem" id="seven">7</div>
                                <div class="grid-item-two calcitem" id="eight">8</div>
                                <div class="grid-item-two calcitem" id="nine">9</div>
                                <div class="grid-item-two calcitem yellowback" id="multiply">x</div>
                                <div class="grid-item-two calcitem" id="four">4</div>
                                <div class="grid-item-two calcitem" id="five">5</div>
                                <div class="grid-item-two calcitem" id="six">6</div>
                                <div class="grid-item-two calcitem yellowback" id="minus">-</div>
                                <div class="grid-item-two calcitem" id="one">1</div>
                                <div class="grid-item-two calcitem" id="two">2</div>
                                <div class="grid-item-two calcitem" id="three">3</div>
                                <div class="grid-item-two calcitem yellowback" id="add">+</div>
                                <div class="grid-item-two calcitem" id="delete">del</div>
                                <div class="grid-item-two calcitem" id="zero">0</div>
                                <div class="grid-item-two calcitem" id="dot">.</div>
                                <div class="grid-item-two calcitem lemonback" id="equals">=</div>
                              </div>
                        </div>
                       
                    </div>
                    
                </div>
            </div>
           
        </div>



        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
         <script src="js/main.js"></script>
    </body>

</html>
